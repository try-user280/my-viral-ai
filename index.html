<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Optimization -->
    <title>Zenoic Viral AI - YouTube SEO & Content Strategy Tool</title>
    <meta name="description" content="Zenoic Viral AI helps you generate trending YouTube titles and tags using Gemini AI. Get viral secrets for your videos instantly.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { background: #010101; font-family: 'Outfit', sans-serif; color: white; }
        .glass-ui { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(90deg, #ff0055, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader-ring { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #ff0055; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-6 flex justify-between items-center glass-ui sticky top-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter">ZENOIC<span class="text-red-500">.AI</span></h1>
        <div class="px-3 py-1 bg-red-600/20 rounded-full text-[10px] font-bold text-red-500 uppercase">Pro Cloud v4</div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <h2 class="text-5xl font-black mb-4">Generate <span class="gradient-text italic">Viral Content</span></h2>
            <p class="text-gray-500 text-sm tracking-wide">Enter your video idea and let Gemini AI craft the perfect strategy.</p>
        </div>

        <!-- Input Bar -->
        <div class="glass-ui p-2 rounded-2xl flex gap-2 mb-12 group focus-within:border-red-600/50 transition-all">
            <input type="text" id="topic" placeholder="e.g. Free Fire New Event Secret" 
                class="flex-1 bg-transparent p-4 outline-none font-medium placeholder:text-gray-700">
            <button onclick="runZenoicEngine()" id="btn" 
                class="bg-white text-black px-8 py-4 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all flex items-center gap-2">
                <span>ANALYZE</span>
                <div id="loading" class="hidden loader-ring"></div>
            </button>
        </div>

        <!-- Result Box -->
        <div id="resultBox" class="hidden mb-12">
            <div class="glass-ui rounded-3xl p-8 border-l-4 border-red-600">
                <div class="flex items-center gap-2 mb-4">
                    <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Strategy Generated</span>
                </div>
                <div id="aiText" class="text-gray-200 text-base leading-relaxed whitespace-pre-wrap italic"></div>
            </div>
        </div>

        <!-- History Display -->
        <div>
            <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                <span>Recent History</span>
                <span id="historyCount" class="text-xs bg-gray-800 px-2 py-0.5 rounded text-gray-400">0</span>
            </h3>
            <div id="historyGrid" class="grid gap-4"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb3PQEqWmrHz4NDTaxDXsAFvAxrcC6bkY",
            authDomain: "zenoic-ai-suite.firebaseapp.com",
            projectId: "zenoic-ai-suite",
            storageBucket: "zenoic-ai-suite.firebasestorage.app",
            messagingSenderId: "419401725665",
            appId: "1:419401725665:web:e5f02e06834a9b0ae6a9a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const YT_KEY = "AIzaSyBwBchc3gEBxy2UvuDDQwWlUvUs68c7ZnI";
        const GM_KEY = "AIzaSyD-tLFz5V8H8P0X90SCFR7dLN63T8sMXzA";

        // Local History Initialization
        const updateUIHistory = () => {
            const history = JSON.parse(localStorage.getItem('zHistory') || "[]");
            document.getElementById('historyCount').innerText = history.length;
            document.getElementById('historyGrid').innerHTML = history.map(h => `
                <div class="glass-ui p-5 rounded-2xl border-white/5">
                    <h4 class="text-sm font-bold text-red-500 mb-1">${h.topic}</h4>
                    <p class="text-[11px] text-gray-500 line-clamp-2 italic">${h.data}</p>
                </div>
            `).join('');
        };
        updateUIHistory();

        window.runZenoicEngine = async () => {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loading');
            const resBox = document.getElementById('resultBox');
            const aiText = document.getElementById('aiText');

            if(!topic) return;
            btn.disabled = true; loader.classList.remove('hidden');

            try {
                // 1. YouTube Step
                const yt = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${topic}&maxResults=3&key=${YT_KEY}`).then(r => r.json());
                const trendInfo = yt.items?.map(i => i.snippet.title).join(" | ") || "Global Trends";

                // 2. Gemini Step
                const gm = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GM_KEY}`, {
                    method: "POST",
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `YouTube Topic: ${topic}. Trends: ${trendInfo}. Provide 3 Viral Titles, 5 Tags, and 1 Secret Hook.` }] }] })
                }).then(r => r.json());

                const finalStrategy = gm.candidates[0].content.parts[0].text;

                // 3. Save to Firebase & Local
                await addDoc(collection(db, "viral_secrets"), { topic, finalStrategy, date: new Date().toISOString() });
                
                let h = JSON.parse(localStorage.getItem('zHistory') || "[]");
                h.unshift({ topic, data: finalStrategy });
                localStorage.setItem('zHistory', JSON.stringify(h.slice(0, 5)));

                // UI Final
                aiText.innerText = finalStrategy;
                resBox.classList.remove('hidden');
                updateUIHistory();
                document.getElementById('topic').value = "";

            } catch (err) {
                alert("Gemini is cooling down. Wait 10 seconds.");
            } finally {
                btn.disabled = false; loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenoic Viral AI | V6 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .btn-red { background: #ff0044; transition: 0.3s; }
        .btn-red:hover { background: #cc0033; transform: scale(0.98); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <h1 class="text-3xl font-black mb-2 italic">ZENOIC<span class="text-red-600">.AI</span></h1>
    <p class="text-gray-500 text-[10px] tracking-widest uppercase mb-10">Direct API Node Active</p>

    <div class="glass p-4 w-full max-w-md">
        <input type="text" id="topic" placeholder="e.g. Free Fire Video Idea" 
            class="w-full bg-transparent p-4 outline-none border-b border-white/10 mb-4 font-bold text-white">
        
        <button onclick="runAI()" id="btn" class="btn-red w-full py-4 rounded-xl font-bold uppercase tracking-wider text-xs">
            Analyze Topic
        </button>
    </div>

    <div id="resultBox" class="hidden mt-8 w-full max-w-md animate-pulse">
        <div class="glass p-6 border-l-4 border-red-600">
            <p id="out" class="text-sm leading-relaxed text-gray-200 whitespace-pre-wrap italic"></p>
        </div>
    </div>

    <script>
        // ✅ Aapki Provide ki hui Exact Key
        const KEY = "AIzaSyCekGS7nYTUUJHzf60jRbCfjBi38tmxx-g";

        async function runAI() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('btn');
            const out = document.getElementById('out');
            const resBox = document.getElementById('resultBox');

            if(!topic) return;

            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                // Flash model is faster for mobile users in Jamshedpur
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Topic: ${topic}. Provide 1 Viral Title and 5 Ranking Tags.` }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0]) {
                    out.innerText = data.candidates[0].content.parts[0].text;
                    resBox.classList.remove('hidden');
                    resBox.classList.remove('animate-pulse');
                } else {
                    alert("Quota Full! Wait 60 seconds.");
                }
            } catch (err) {
                alert("Network Error! Please refresh.");
            } finally {
                btn.innerText = "Analyze Topic";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

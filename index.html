<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tags -->
    <title>Zenoic Viral AI - YouTube Trending Strategy Tool</title>
    <meta name="description" content="Zenoic Viral AI tool helps creators find trending YouTube titles, tags, and viral strategies using Gemini AI.">
    <meta name="keywords" content="YouTube Viral Tool, AI Strategy, Zenoic AI, YouTube SEO, Trending Tags">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: #020617; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
        }
        .ai-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .history-card:hover { border-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header / Navbar -->
    <nav class="p-6 border-b border-white/5 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-2xl font-extrabold tracking-tighter">ZENOIC<span class="text-indigo-500">.AI</span></h1>
        <div class="hidden md:block text-xs text-gray-400 font-mono">V3.0 HYPER-DRIVE</div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-12">
        <!-- Hero Section -->
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4">Make Your Video <br><span class="ai-gradient underline">Go Viral Today</span></h2>
            <p class="text-gray-400 max-w-lg mx-auto text-sm">Real-time YouTube Trend Analysis powered by Gemini Pro Intelligence.</p>
        </div>

        <!-- Input Box -->
        <div class="glass p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl mb-12">
            <input type="text" id="topic" placeholder="Enter your video topic..." 
                class="flex-1 bg-transparent p-4 outline-none text-white font-medium placeholder:text-gray-600">
            <button onclick="generateViralSystem()" id="mainBtn" 
                class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                <span>Analyze</span>
                <div id="loader" class="hidden h-4 w-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
        </div>

        <!-- Main Output Result -->
        <div id="resultContainer" class="hidden mb-16 animate-in fade-in zoom-in duration-500">
            <div class="glass rounded-3xl p-8 border-indigo-500/30 shadow-[0_0_40px_rgba(99,102,241,0.1)]">
                <div class="flex items-center gap-2 mb-6">
                    <span class="bg-indigo-500 h-3 w-3 rounded-full animate-ping"></span>
                    <h3 class="text-xs font-bold tracking-[0.3em] text-indigo-400 uppercase">Analysis Complete</h3>
                </div>
                <div id="aiOutput" class="text-gray-200 leading-relaxed text-sm md:text-base whitespace-pre-wrap"></div>
            </div>
        </div>

        <!-- History Section -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h4 class="text-lg font-bold">Recent History</h4>
                <button onclick="clearHistory()" class="text-xs text-gray-500 hover:text-red-400">Clear All</button>
            </div>
            <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- History items will appear here -->
            </div>
        </section>
    </main>

    <script type="module">
        // Firebase and API Keys Integration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCb3PQEqWmrHz4NDTaxDXsAFvAxrcC6bkY",
            authDomain: "zenoic-ai-suite.firebaseapp.com",
            projectId: "zenoic-ai-suite",
            storageBucket: "zenoic-ai-suite.firebasestorage.app",
            messagingSenderId: "419401725665",
            appId: "1:419401725665:web:e5f02e06834a9b0ae6a9a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const YT_KEY = "AIzaSyBwBchc3gEBxy2UvuDDQwWlUvUs68c7ZnI";
        const GEMINI_KEY = "AIzaSyD-tLFz5V8H8P0X90SCFR7dLN63T8sMXzA";

        // Load History on Start
        window.onload = () => displayHistory();

        window.generateViralSystem = async () => {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');
            const output = document.getElementById('aiOutput');
            const container = document.getElementById('resultContainer');

            if(!topic) return alert("Please enter a topic!");

            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                // 1. YouTube Fetch
                const ytRes = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${topic}&type=video&maxResults=3&key=${YT_KEY}`);
                const ytData = await ytRes.json();
                const ytTitles = ytData.items?.map(v => v.snippet.title).join(" | ") || "No trend data";

                // 2. Gemini Fetch
                const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Topic: ${topic}. YT Data: ${ytTitles}. Generate: 1. A viral headline. 2. 5 high-traffic tags. 3. Why this will work. Keep it professional.` }] }]
                    })
                });
                const aiData = await geminiRes.json();
                const strategy = aiData.candidates[0].content.parts[0].text;

                // 3. Save to Firebase & Local History
                await addDoc(collection(db, "viral_secrets"), { topic, strategy, time: new Date().toISOString() });
                saveToLocalHistory(topic, strategy);

                // UI Update
                output.innerText = strategy;
                container.classList.remove('hidden');
                displayHistory();

            } catch (e) {
                alert("Error: AI is overloaded. Try again in 10s.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        };

        function saveToLocalHistory(topic, strategy) {
            let history = JSON.parse(localStorage.getItem('zenoic_history') || "[]");
            history.unshift({ topic, strategy, date: new Date().toLocaleDateString() });
            localStorage.setItem('zenoic_history', JSON.stringify(history.slice(0, 6))); // Keep last 6
        }

        function displayHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('zenoic_history') || "[]");
            list.innerHTML = history.map(item => `
                <div class="glass p-4 rounded-2xl border-white/5 history-card transition-all cursor-pointer">
                    <p class="text-xs text-indigo-400 font-bold mb-1">${item.date}</p>
                    <h5 class="text-sm font-semibold mb-2">${item.topic}</h5>
                    <p class="text-[10px] text-gray-500 line-clamp-2">${item.strategy}</p>
                </div>
            `).join('');
        }

        window.clearHistory = () => {
            localStorage.removeItem('zenoic_history');
            displayHistory();
        };
    </script>
</body>
</html>

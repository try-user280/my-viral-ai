<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral AI Secrets | Zenoic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% 50%, #1a0000 0%, #050505 100%); }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(220, 38, 38, 0.2); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card p-8 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="header-font text-3xl font-black text-white italic tracking-tighter mb-8">VIRAL<span class="text-red-600">AI</span></h1>
        
        <input type="text" id="topic" placeholder="Topic: e.g. T-Series vs MrBeast" 
            class="w-full p-4 mb-4 rounded-xl bg-black/40 border border-gray-800 outline-none text-sm">
            
        <button onclick="getViralSecrets()" id="btn" class="w-full bg-red-600 p-4 rounded-xl font-bold uppercase tracking-widest text-sm flex items-center justify-center gap-2">
            <span id="btnText">Execute Analysis</span>
        </button>

        <div id="result" class="mt-8 hidden text-left">
            <div id="aiContent" class="bg-black/60 p-5 rounded-2xl text-gray-300 text-xs leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCb3PQEqWmrHz4NDTaxDXsAFvAxrcC6bkY",
          authDomain: "zenoic-ai-suite.firebaseapp.com",
          projectId: "zenoic-ai-suite",
          storageBucket: "zenoic-ai-suite.firebasestorage.app",
          messagingSenderId: "419401725665",
          appId: "1:419401725665:web:e5f02e06834a9b0ae6a9a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const YT_KEY = "AIzaSyBwBchc3gEBxy2UvuDDQwWlUvUs68c7ZnI"; 
        const GEMINI_KEY = "AIzaSyD-tLFz5V8H8P0X90SCFR7dLN63T8sMXzA";

        window.getViralSecrets = async () => {
            const topic = document.getElementById('topic').value;
            const btnText = document.getElementById('btnText');
            const resultDiv = document.getElementById('result');
            const aiContent = document.getElementById('aiContent');

            if(!topic) return alert("Topic enter karein!");
            btnText.innerText = "Processing...";

            try {
                // YouTube Fetch
                const ytRes = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${topic}&type=video&maxResults=3&key=${YT_KEY}`);
                const ytData = await ytRes.json();
                const titles = ytData.items?.map(v => v.snippet.title).join(", ") || "No trending data";

                // Gemini Fetch with Safety
                const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Topic: ${topic}. Data: ${titles}. Give 1 viral title and tags.` }] }] })
                });

                const aiData = await geminiRes.json();
                
                // CHECK: Agar AI ne answer nahi diya toh default msg dikhao
                if (!aiData.candidates || !aiData.candidates[0]) {
                    throw new Error("AI is busy. Please try again in 5 seconds.");
                }

                const aiText = aiData.candidates[0].content.parts[0].text;

                // Save to Cloud
                await addDoc(collection(db, "viral_secrets"), { topic, report: aiText, time: new Date().toISOString() });

                aiContent.innerText = aiText;
                resultDiv.classList.remove('hidden');
                btnText.innerText = "Execute Analysis";

            } catch (err) {
                alert(err.message);
                btnText.innerText = "Try Again";
            }
        }
    </script>
</body>
</html>
